name: test

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  smoke-pinned:
    name: pinned version + dry-run autofix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - id: scan
        uses: ./
        with:
          version: "0.3.0"
          autofix: dry-run
          fail-on: critical
          upload-sarif: false
      - name: Show outputs
        run: |
          echo "version=${{ steps.scan.outputs.resolved-version }}"
          echo "findings=${{ steps.scan.outputs.findings }}"
          echo "failing=${{ steps.scan.outputs.failing-findings }}"

  smoke-default:
    name: default version + permissive gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: ./
        with:
          fail-on: none

  smoke-reusable:
    name: reusable workflow self-call
    uses: ./.github/workflows/scan.yml
    permissions:
      contents: read
      security-events: write
    with:
      fail-on: none

  drift:
    name: action.yml / scan.yml / README drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install --no-deps pyyaml==6.0.2
      - run: python scripts/check_action_drift.py
